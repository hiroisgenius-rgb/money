<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資産残高管理端末 (Biometrics & Auto-Lock)</title>
    <style>
        body {
            font-family: 'Courier New', 'Zen Maru Gothic', monospace, sans-serif;
            background-color: #2b302a; /* OD色ベース */
            color: #d4dcce;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        #auth-screen {
            background-color: #1a1e19;
            border: 2px solid #556b2f;
            padding: 40px 30px;
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px;
            margin-top: 50px;
        }
        #main-screen {
            display: none;
            background-color: #1e241d;
            border: 3px double #556b2f;
            padding: 25px;
            border-radius: 4px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
        }
        h1, h2 {
            text-align: center;
            color: #7cfc00; /* 蛍光グリーン */
            text-shadow: 0 0 5px rgba(124, 252, 0, 0.5);
            margin-top: 0;
            letter-spacing: 2px;
        }
        h1 { font-size: 22px; border-bottom: 1px solid #556b2f; padding-bottom: 10px; margin-bottom: 20px; }
        h2 { font-size: 16px; text-align: left; margin-top: 20px; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab-btn {
            flex: 1; padding: 10px; background-color: #1a1e19; color: #889980;
            border: 1px solid #556b2f; border-bottom: none; cursor: pointer;
            font-weight: bold; font-size: 14px; border-radius: 4px 4px 0 0;
        }
        .tab-btn.active { background-color: #3b4d32; color: #7cfc00; border-color: #7cfc00 #7cfc00 #3b4d32 #7cfc00; }

        .balance-box {
            background-color: #111410; border: 1px dashed #7cfc00; color: #7cfc00;
            text-align: center; padding: 15px; font-size: 32px; font-weight: bold;
            margin-bottom: 20px; font-family: 'Courier New', monospace;
        }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #a3b19b; font-size: 13px; font-weight: bold; }
        input, select {
            width: 100%; padding: 10px; box-sizing: border-box; background-color: #111410;
            border: 1px solid #556b2f; color: #7cfc00; border-radius: 4px; font-size: 16px;
        }
        input:focus, select:focus { outline: 1px solid #7cfc00; }
        .pin-input { text-align: center; font-size: 24px; width: 80%; margin-bottom: 20px; letter-spacing: 10px; }
        
        button {
            width: 100%; padding: 12px; background-color: #3b4d32; color: #dfedf0;
            border: 1px solid #556b2f; border-radius: 4px; font-size: 15px;
            cursor: pointer; font-weight: bold; letter-spacing: 1px;
        }
        button:hover { background-color: #4c6341; border-color: #7cfc00; }
        button:disabled { background-color: #222; color: #555; border-color: #333; cursor: not-allowed; }
        
        .bio-btn { background-color: #1d3557; border-color: #457b9d; margin-bottom: 15px; }
        .bio-btn:hover { background-color: #457b9d; border-color: #7cfc00; }
        .clear-btn { background-color: #5a2525; border-color: #8b0000; margin-top: 15px; font-size: 13px; padding: 8px; }
        .clear-btn:hover { background-color: #783232; }

        .timeline { background-color: #111410; border: 1px solid #3b4d32; max-height: 180px; overflow-y: auto; padding: 10px; border-radius: 4px; font-size: 13px; }
        .timeline-item { padding: 6px 0; border-bottom: 1px dashed #2b302a; display: flex; justify-content: space-between; }
        .timeline-item:last-child { border-bottom: none; }
        .item-in { color: #4ed8a7; }
        .item-out { color: #ff6b6b; }
        .item-date { color: #666; font-size: 11px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <h2>[ 端末ロック解除 ]</h2>
    <p id="auth-msg" style="font-size:12px; color:#889980; margin-bottom:20px;">生体認証を起動するか、4桁のパスワードを入力してください</p>
    
    <button id="bio-login-btn" class="bio-btn" onclick="loginWithBiometrics()" style="display:none;">👁️ 顔・指紋認証を起動</button>
    
    <input type="password" id="pin" class="pin-input" maxlength="4" placeholder="••••" onkeydown="if(event.key==='Enter')verifyPin()">
    <button id="auth-btn" onclick="verifyPin()">パスワードでログイン</button>
</div>

<div id="main-screen">
    <h1>資産残高管理端末</h1>
    
    <div class="tabs">
        <button id="tab-cash" class="tab-btn active" onclick="switchMode('cash')">現金</button>
        <button id="tab-pasmo" class="tab-btn" onclick="switchMode('pasmo')">PASMO</button>
    </div>

    <div class="balance-box">
        ￥ <span id="balance">0</span>
    </div>

    <div class="input-group">
        <label>【区分】</label>
        <select id="type">
            <option value="out">支出（お金を使った）</option>
            <option value="in">収入・チャージ（お金を入れた）</option>
        </select>
    </div>

    <div class="input-group">
        <label>【メモ】</label>
        <input type="text" id="memo" placeholder="例: 電車代、自販機、お小遣い" maxlength="20">
    </div>

    <div class="input-group">
        <label>【金額】</label>
        <input type="number" id="amount" placeholder="0" min="0">
    </div>

    <button onclick="updateBalance()">残高を更新する</button>

    <h2>【履歴】</h2>
    <div class="timeline" id="timeline"></div>

    <h2>【セキュリティ設定】</h2>
    <button class="bio-btn" onclick="registerBiometrics()">🛡️ この端末の生体認証(顔・指紋)を登録</button>

    <button class="clear-btn" onclick="resetData()">全データをリセット</button>
</div>

<script>
    // 「1234」のハッシュ値
    const HASHED_PASSWORD = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4";

    let currentMode = 'cash';
    let data = {
        cash: {
            balance: parseInt(localStorage.getItem('wallet_cash_balance')) || 0,
            history: JSON.parse(localStorage.getItem('wallet_cash_history')) || []
        },
        pasmo: {
            balance: parseInt(localStorage.getItem('wallet_pasmo_balance')) || 0,
            history: JSON.parse(localStorage.getItem('wallet_pasmo_history')) || []
        }
    };

    let missCount = 0;
    let idleTimer; // 自動ログアウト用のタイマー変数

    // 起動時のチェック
    window.onload = function() {
        const lockUntil = localStorage.getItem('wallet_lock_time');
        if (lockUntil && Date.now() < lockUntil) {
            startLockTimer(lockUntil - Date.now());
            return;
        }

        if (window.PublicKeyCredential) {
            const hasCred = localStorage.getItem('wallet_bio_registered');
            if (hasCred) {
                document.getElementById('bio-login-btn').style.display = 'block';
                loginWithBiometrics();
            }
        }
    }

    // ⏱️ 自動ログアウトの監視システム
    function resetIdleTimer() {
        clearTimeout(idleTimer);
        // 180000ミリ秒 = 3分間操作がない場合にログアウトを実行
        idleTimer = setTimeout(logout, 180000); 
    }

    // ユーザーの操作イベントを検知する登録
    function startIdleMonitoring() {
        window.onclick = resetIdleTimer;
        window.onmousemove = resetIdleTimer;
        window.onkeypress = resetIdleTimer;
        window.ontouchstart = resetIdleTimer;
        resetIdleTimer();
    }

    function stopIdleMonitoring() {
        window.onclick = null;
        window.onmousemove = null;
        window.onkeypress = null;
        window.ontouchstart = null;
        clearTimeout(idleTimer);
    }

    // 🔒 ログアウト処理
    function logout() {
        stopIdleMonitoring();
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('auth-screen').style.display = 'block';
        document.getElementById('pin').value = '';
        
        // もしすでに生体認証が登録されていれば自動で再起動
        if (localStorage.getItem('wallet_bio_registered')) {
            loginWithBiometrics();
        }
    }

    // パスワード認証
    async function verifyPin() {
        const pinInput = document.getElementById('pin');
        const inputPin = pinInput.value;

        const encoder = new TextEncoder();
        const utf8Data = encoder.encode(inputPin);
        const hashBuffer = await crypto.subtle.digest('SHA-256', utf8Data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        const inputHash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');

        if (inputHash === HASHED_PASSWORD) {
            loginSuccess();
        } else {
            missCount++;
            pinInput.value = '';
            if (missCount >= 5) {
                const lockDuration = 180000;
                localStorage.setItem('wallet_lock_time', Date.now() + lockDuration);
                startLockTimer(lockDuration);
                missCount = 0;
            } else {
                alert(`パスワードが違います（残り: ${5 - missCount}回）`);
            }
        }
    }

    // 生体認証登録
    async function registerBiometrics() {
        try {
            const id = new Uint8Array(16);
            window.crypto.getRandomValues(id);

            const options = {
                publicKey: {
                    challenge: window.crypto.getRandomValues(new Uint8Array(32)),
                    rp: { name: "Wallet App" },
                    user: { id: id, name: "user@wallet.local", displayName: "User" },
                    pubKeyCredParams: [{ type: "public-key", alg: -7 }],
                    authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                    timeout: 60000
                }
            };

            const credential = await navigator.credentials.create(options);
            if (credential) {
                localStorage.setItem('wallet_bio_registered', 'true');
                document.getElementById('bio-login-btn').style.display = 'block';
                alert('生体認証の登録に成功しました！次回から顔・指紋認証でログインできます。');
            }
        } catch (err) {
            console.error(err);
            alert('登録がキャンセルされたか、お使いの端末が対応していません。');
        }
    }

    // 生体認証ログイン
    async function loginWithBiometrics() {
        try {
            const options = {
                publicKey: {
                    challenge: window.crypto.getRandomValues(new Uint8Array(32)),
                    userVerification: "required",
                    timeout: 60000
                }
            };

            const assertion = await navigator.credentials.get(options);
            if (assertion) {
                loginSuccess();
            }
        } catch (err) {
            console.error(err);
        }
    }

    function loginSuccess() {
        missCount = 0;
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        renderData();
        startIdleMonitoring(); /* ログイン完了と同時に放置監視スタート */
    }

    function startLockTimer(duration) {
        const authBtn = document.getElementById('auth-btn');
        const bioBtn = document.getElementById('bio-login-btn');
        const pinInput = document.getElementById('pin');
        const authMsg = document.getElementById('auth-msg');
        
        authBtn.disabled = true;
        bioBtn.disabled = true;
        pinInput.disabled = true;
        
        let timeLeft = Math.ceil(duration / 1000);
        const timer = setInterval(() => {
            timeLeft--;
            authMsg.innerText = `連続失敗によりロック中：残り ${timeLeft} 秒`;
            authMsg.style.color = '#ff6b6b';
            
            if (timeLeft <= 0) {
                clearInterval(timer);
                authBtn.disabled = false;
                bioBtn.disabled = localStorage.getItem('wallet_bio_registered') ? false : true;
                pinInput.disabled = false;
                authMsg.innerText = "4桁のパスワードを入力してください";
                authMsg.style.color = '#889980';
                localStorage.removeItem('wallet_lock_time');
            }
        }, 1000);
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('tab-cash').classList.toggle('active', mode === 'cash');
        document.getElementById('tab-pasmo').classList.toggle('active', mode === 'pasmo');
        renderData();
    }

    function renderData() {
        const activeData = data[currentMode];
        document.getElementById('balance').innerText = activeData.balance.toLocaleString();
        
        const timelineDiv = document.getElementById('timeline');
        timelineDiv.innerHTML = '';

        for (let i = activeData.history.length - 1; i >= 0; i--) {
            const item = activeData.history[i];
            const itemDiv = document.createElement('div');
            itemDiv.className = 'timeline-item';
            
            const isInc = item.type === 'in';
            const typeText = isInc ? '[収入]' : '[支出]';
            const classText = isInc ? 'item-in' : 'item-out';
            const sign = isInc ? '+' : '-';

            itemDiv.innerHTML = `
                <div><span class="${classText}">${typeText}</span> ${item.memo || '未分類'}</div>
                <div style="text-align: right;">
                    <span class="${classText}">${sign}￥${item.amount.toLocaleString()}</span><br>
                    <span class="item-date">${item.date}</span>
                </div>
            `;
            timelineDiv.appendChild(itemDiv);
        }
        if(activeData.history.length === 0) {
            timelineDiv.innerHTML = '<div style="color:#556b2f; text-align:center; padding:10px;">履歴はありません</div>';
        }
    }

    function updateBalance() {
        const type = document.getElementById('type').value;
        const amountInput = document.getElementById('amount');
        const memoInput = document.getElementById('memo');
        const amount = parseInt(amountInput.value);
        const memo = memoInput.value.trim();

        if (isNaN(amount) || amount <= 0) {
            alert('正しい金額を入力してください');
            return;
        }

        let activeData = data[currentMode];
        if (type === 'out' && activeData.balance < amount) {
            alert('残高が不足しています');
            return;
        }

        if (type === 'in') activeData.balance += amount;
        if (type === 'out') activeData.balance -= amount;

        const now = new Date();
        const dateStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

        activeData.history.push({ type: type, amount: amount, memo: memo, date: dateStr });

        localStorage.setItem(`wallet_${currentMode}_balance`, activeData.balance);
        localStorage.setItem(`wallet_${currentMode}_history`, JSON.stringify(activeData.history));

        amountInput.value = ''; memoInput.value = '';
        renderData();
    }

    function resetData() {
        const modeText = currentMode === 'cash' ? '現金' : 'PASMO';
        if (confirm(`選択中の【${modeText}】の残高と履歴データをすべて削除します。よろしいですか？`)) {
            data[currentMode].balance = 0;
            data[currentMode].history = [];
            localStorage.removeItem(`wallet_${currentMode}_balance`);
            localStorage.removeItem(`wallet_${currentMode}_history`);
            renderData();
        }
    }
</script>

</body>
</html>
